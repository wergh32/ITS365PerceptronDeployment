<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>L vs T Perceptron</title>
<style>
    body { 
        text-align: center; 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: linear-gradient(120deg, #fdfbfb, #ebedee);
        color: #333;
    }
    h1 { 
        color: #4a148c; 
        text-shadow: 1px 1px 2px #aaa; 
    }
    table { 
        margin:auto; 
        border-collapse: collapse; 
        margin-top: 20px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        border-radius: 10px;
        overflow: hidden;
    }
    td { 
        width: 60px; 
        height: 60px; 
        border: 2px solid #4a148c; 
        cursor: pointer; 
        background:#f3e5f5; 
        transition: background 0.2s, transform 0.1s;
        border-radius: 8px;
    }
    td.active { 
        background:#7b1fa2; 
        box-shadow: inset 0 0 10px #4a148c;
        transform: scale(1.05);
    }
    td:hover { 
        transform: scale(1.05);
        background: #d1c4e9;
    }
    button { 
        margin: 10px; 
        padding:12px 25px; 
        font-size:16px; 
        border:none; 
        border-radius: 8px; 
        cursor:pointer;
        color: #fff;
        background: linear-gradient(45deg, #7b1fa2, #4a148c);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        transition: transform 0.1s, box-shadow 0.2s;
    }
    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 12px rgba(0,0,0,0.3);
    }
    #result { 
        margin-top: 20px; 
        font-size: 24px; 
        color: #880e4f; 
        text-shadow: 1px 1px 2px #ccc;
    }
</style>
</head>
<body>
<h1>L vs T Perceptron</h1>
<p>Click LEDs to draw a shape, then click "Classify".</p>

<table id="grid"></table>
<button id="classify-btn">Classify</button>
<button id="clear-btn">Clear</button>
<h2 id="result">Result: </h2>

<script>
// --- Build 4x4 grid ---
const grid = document.getElementById("grid");
const cells = [];
for(let r=0;r<4;r++){
    const row = document.createElement("tr");
    const rowCells = [];
    for(let c=0;c<4;c++){
        const td = document.createElement("td");
        td.addEventListener("click", ()=>td.classList.toggle("active"));
        row.appendChild(td);
        rowCells.push(td);
    }
    grid.appendChild(row);
    cells.push(rowCells);
}

// --- Helper: flatten grid ---
function flattenGrid() {
    const flat = [];
    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            flat.push(cells[r][c].classList.contains("active")?1:0);
        }
    }
    return flat;
}

// --- Generate training data ---
function generateL(){
    const grid = Array(16).fill(0);
    const row = Math.floor(Math.random()*3);
    const col = Math.floor(Math.random()*3);
    const vert = Math.floor(Math.random()*(4-row-1))+2;
    const horiz = Math.floor(Math.random()*(4-col-1))+2;
    for(let r=row;r<row+vert;r++) grid[r*4+col]=1;
    for(let c=col;c<col+horiz;c++) grid[(row+vert-1)*4+c]=1;
    return grid;
}

function generateT(){
    const grid = Array(16).fill(0);
    const row = Math.floor(Math.random()*3);
    const col = Math.floor(Math.random()*2);
    const horiz = Math.floor(Math.random()*(4-col-1))+2;
    const vert = Math.floor(Math.random()*(4-row-1))+2;
    for(let c=col;c<col+horiz;c++) grid[row*4+c]=1;
    const mid = col+Math.floor(horiz/2);
    for(let r=row;r<row+vert;r++) grid[r*4+mid]=1;
    return grid;
}

// --- Perceptron training ---
let X_train = [];
let y_train = [];
for(let i=0;i<100;i++){
    X_train.push(generateL()); y_train.push(1);
    X_train.push(generateT()); y_train.push(-1);
}

let weights = Array(16).fill(0);
let bias = 0;
const lr = 0.1;
for(let epoch=0;epoch<500;epoch++){
    for(let i=0;i<X_train.length;i++){
        const x = X_train[i];
        let sum = bias;
        for(let j=0;j<16;j++) sum += weights[j]*x[j];
        let y_pred = sum>=0?1:-1;
        if(y_train[i]*y_pred <=0){
            for(let j=0;j<16;j++) weights[j]+=lr*y_train[i]*x[j];
            bias += lr*y_train[i];
        }
    }
}

// --- Predict ---
function predict(input){
    let sum = bias;
    for(let i=0;i<16;i++) sum += weights[i]*input[i];
    return sum>=0?1:-1;
}

// --- Classify button ---
document.getElementById("classify-btn").addEventListener("click", ()=>{
    const flat = flattenGrid();
    const y = predict(flat);
    document.getElementById("result").innerText = "Result: "+(y===1?"L":"T");
});

// --- Clear button ---
document.getElementById("clear-btn").addEventListener("click", ()=>{
    for(let r=0;r<4;r++){
        for(let c=0;c<4;c++){
            cells[r][c].classList.remove("active");
        }
    }
    document.getElementById("result").innerText = "Result: ";
});
</script>
</body>
</html>
